  - Combos:
      - Combo:
          - smk_ascended_armor
          - smk_ascended_garment
          - smk_ascended_shoes
    Smoke: true
    Script: |
      // ===============================
      // ASCENDED TYPE SYSTEM (Slot 4)
      // ===============================
      .@armor_card   = getequipcardid(EQI_ARMOR, 3);
      .@garment_card = getequipcardid(EQI_GARMENT, 3);
      .@boots_card   = getequipcardid(EQI_SHOES, 3);
      if (.@armor_card > 0 && .@garment_card > 0 && .@boots_card > 0) {
          if (.@armor_card == .@garment_card && .@armor_card == .@boots_card) {
              // PHYSICAL (DPS corpo a corpo / crítico / burst)
                if (.@armor_card == 840209) {
                    bonus bAtkRate,200;
                    bonus2 bAddClass,Class_Boss,20;
                    bonus bPow,15;        // escala dano físico
                    bonus bCrt,10;        // reforça build crítica
                }

                // RANGED (precisăo + consistęncia)
                else if (.@armor_card == 840210) {
                    bonus bLongAtkRate,25;
                    bonus bHit,50;
                    bonus bCon,15;        // melhora dano ranged e precisăo scaling
                    bonus bPow,5;         // leve suporte ofensivo
                }

                // MAGIC (caster puro)
                else if (.@armor_card == 840211) {
                    bonus bMatkRate,200;
                    bonus2 bMagicAddClass,Class_Boss,20;
                    bonus bSpl,15;        // principal stat mágica
                    bonus bWis,10;        // sustain/cast performance
                }

                // SUPPORT (cura + utilidade)
                else if (.@armor_card == 840212) {
                    bonus bHealPower,30;
                    bonus bDelayRate,-15;
                    bonus bWis,15;        // melhora suporte/cura
                    bonus bSta,10;        // sobrevivęncia (importante pra suporte)
                }

                // HYBRID (build mista viável)
                else if (.@armor_card == 840213) {
                    bonus bAtkRate,120;
                    bonus bMatkRate,120;
                    bonus bAspdRate,10;
                    bonus bPow,8;
                    bonus bSpl,8;
                    bonus bCon,8;         // estabilidade híbrida
                }

                // ELEMENTAL CLASS (especialista em elementos)
                else if (.@armor_card == 840214) {
                    bonus2 bAddEle,Ele_All,20;
                    bonus2 bMagicAddEle,Ele_All,20;
                    bonus bSpl,10;        // magia elemental
                    bonus bPow,10;        // físico elemental
                    bonus bWis,5;         // controle/consistęncia
                }
          }
      }
      // ===============================
      // REFINE TOTAL BONUS
      // ===============================

      .@total_refine = getequiprefinerycnt(EQI_ARMOR)
                     + getequiprefinerycnt(EQI_GARMENT)
                     + getequiprefinerycnt(EQI_SHOES);
        // 10 + 10 + 10
        if (.@total_refine >= 30) {
            bonus bAllStats,5;
            bonus bPow,5;
            bonus bSta,5;
            bonus bWis,5;
            bonus bSpl,5;
            bonus bCon,5;
            bonus bCrt,5;
        }
        // 15 + 15 + 15
        if (.@total_refine >= 45) {
            bonus bAllStats,5;
            bonus bPow,5;
            bonus bSta,5;
            bonus bWis,5;
            bonus bSpl,5;
            bonus bCon,5;
            bonus bCrt,5;
        }
        // 20 + 20 + 20
        if (.@total_refine >= 60) {
            bonus bAllStats,10;
            bonus bPow,10;
            bonus bSta,10;
            bonus bWis,10;
            bonus bSpl,10;
            bonus bCon,10;
            bonus bCrt,10;
        }