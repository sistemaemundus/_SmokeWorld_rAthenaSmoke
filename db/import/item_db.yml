  - Id: 840055
    AegisName: smw_godlike_armor_t1
    Name: Armadura Smoke GodLike [Tier I]
    Type: Armor
    ArmorLevel: 3
    Locations:
      Armor: true
    EquipLevelMin: 50
    Refineable: true
    Script: |
      .@lv=BaseLevel;
      if(.@lv>100).@lv=100;
      .@scale=.@lv-50;
      bonus bAtk,40+(.@scale*1);
      bonus bMatk,40+(.@scale*1);
      bonus bMaxHPrate,3;
      bonus bAtkRate,8+((.@scale*2)/10);
      bonus bMatkRate,8+((.@scale*2)/10);
    Trade:
      Override: 99
      NoDrop: true
      NoTrade: true
      TradePartner: true
      NoCart: true
      NoStorage: true
      NoGuildStorage: true
      NoMail: true
      NoAuction: true
